<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Graphics Saver</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      padding: 16px;
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #0f172a;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      background: #2563eb;
      color: #fff;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    p {
      font-size: 12px;
      color: #475569;
      margin: 0 0 14px;
      line-height: 1.5;
    }
    button {
      width: 100%;
      padding: 10px 14px;
      background: #2563eb;
      color: #fff;
      border: 0;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 120ms;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    button.secondary {
      background: transparent;
      color: #2563eb;
      border: 1px solid #cbd5e1;
      margin-top: 8px;
    }
    button.secondary:hover { background: rgba(37,99,235,0.06); border-color: #2563eb; }
    button.secondary:disabled { background: transparent; color: #94a3b8; border-color: #e2e8f0; }
    .ok {
      margin-top: 10px;
      font-size: 11px;
      color: #16a34a;
      text-align: center;
    }
    .hint {
      margin-top: 12px;
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
      line-height: 1.5;
    }
    .error {
      margin-top: 10px;
      font-size: 11px;
      color: #dc2626;
      text-align: center;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #e2e8f0; }
      p { color: #cbd5e1; }
      .hint { color: #64748b; }
      button.secondary { color: #60a5fa; border-color: #334155; }
      button.secondary:hover { background: rgba(96,165,250,0.1); border-color: #60a5fa; }
    }
  </style>
</head>
<body>
  <h1>Graphics Saver <span class="badge">PRO</span></h1>
  <p>Сохраняйте изображения с любых сайтов, в том числе там, где правый клик заблокирован.</p>
  <button id="open" type="button">Показать изображения на странице</button>
  <button id="bypass" type="button" class="secondary">Снять защиту от копирования</button>
  <div class="hint">Также: ПКМ на странице или изображении → «Сохранить через Graphics saver»</div>
  <div class="ok" id="ok"></div>
  <div class="error" id="error"></div>
  <script src="popup.js"></script>
</body>
</html>
